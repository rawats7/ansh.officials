  .vip-glow-a { position: absolute; top: -20%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(255,30,60,0.25), transparent 60%); filter: blur(60px); }
  .vip-glow-b { position: absolute; bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(220,0,40,0.2), transparent 60%); filter: blur(60px); }
  .vip-card { position: relative; z-index: 2; width: 100%; max-width: 440px; padding: 40px 28px 32px; border-radius: 28px; background: linear-gradient(145deg, rgba(20,20,22,0.75), rgba(10,10,12,0.85)); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(24px) saturate(160%); box-shadow: 0 30px 80px -20px rgba(255,30,60,0.25), 0 0 0 1px rgba(255,30,60,0.08) inset, 0 0 60px rgba(255,30,60,0.08); animation: vipIn .8s cubic-bezier(.2,.8,.2,1) both; }

  .vip-avatar-ring::after { content:""; position:absolute; inset:4px; border-radius:50%; background:#0a0a0c; }
  @keyframes vipSpin { to { transform: rotate(360deg); } }
  .vip-avatar { position: absolute; inset: 6px; border-radius: 50%; object-fit: cover; width: calc(100% - 12px); height: calc(100% - 12px); z-index: 1; box-shadow: 0 0 30px rgba(255,30,60,.45); }
  .vip-title { font-size: 28px; font-weight: 800; text-align: center; letter-spacing: -.02em; background: linear-gradient(180deg, #fff, #ffb8c2); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 40px rgba(255,30,60,.3); }

  .vip-timer-block { margin-top: 28px; padding: 20px; border-radius: 18px; background: linear-gradient(180deg, rgba(255,30,60,.08), rgba(255,30,60,.02)); border: 1px solid rgba(255,30,60,.18); }
  .vip-timer-label { font-size: 11px; font-weight: 700; letter-spacing: .2em; text-align: center; color: #ff5577; text-transform: uppercase; }
  .vip-timer-num { margin-top: 6px; text-align: center; font-size: 64px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 30px rgba(255,30,60,.8), 0 0 60px rgba(255,30,60,.4); font-variant-numeric: tabular-nums; animation: vipPulse .6s ease; }
  .vip-timer-num.done { font-size: 22px; color: #ff3355; animation: none; }
  @keyframes vipPulse { 0% { transform: scale(.7); opacity:.4;} 100% { transform: scale(1); opacity:1;} }
  .vip-progress { margin-top: 14px; height: 6px; border-radius: 99px; background: rgba(255,255,255,.06); overflow: hidden; }
  .vip-progress-bar { height: 100%; background: linear-gradient(90deg, #ff0033, #ff5577); box-shadow: 0 0 12px rgba(255,30,60,.8); transition: width .1s linear; border-radius: 99px; width: 0%; }
  .vip-status { margin-top: 10px; text-align: center; font-size: 13px; font-weight: 600; color: #ff5577; min-height: 18px; letter-spacing: .02em; }

  .vip-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 24px; padding: 16px 20px; border: 0; border-radius: 14px; cursor: pointer; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: .04em; color: #fff; background: linear-gradient(135deg, #229ED9 0%, #2AABEE 50%, #1d8ec3 100%); box-shadow: 0 12px 30px -8px rgba(42,171,238,.6), 0 0 0 1px rgba(255,255,255,.08) inset; transition: transform .2s ease, box-shadow .2s ease; animation: vipBtnPulse 2s ease-in-out infinite; text-decoration: none; }

  .vip-btn:active { transform: translateY(0); }
  @keyframes vipBtnPulse { 0%,100% { box-shadow: 0 12px 30px -8px rgba(42,171,238,.6), 0 0 0 0 rgba(42,171,238,.5);} 50% { box-shadow: 0 12px 30px -8px rgba(42,171,238,.6), 0 0 0 12px rgba(42,171,238,0);} }
  .vip-btn svg { width: 22px; height: 22px; }
  .vip-trust { margin-top: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .vip-trust-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); font-size: 12.5px; color: rgba(255,255,255,.82); font-weight: 500; }
  .vip-check { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, #ff0033, #ff5577); color: #fff; font-size: 10px; font-weight: 900; flex-shrink: 0; box-shadow: 0 0 8px rgba(255,30,60,.6); }

<script>
(function() {
    var TELEGRAM_LINK = "https://t.me/+LBwn5Hb0OhFlNjZl";
    var totalMs = 3000;
    var timerEl = document.getElementById('vipTimerNum');
    var barEl = document.getElementById('vipProgressBar');
    var statusEl = document.getElementById('vipStatus');
    var redirected = false;

    function fireSubscribe() {
        if (typeof fbq !== 'undefined') {
            fbq('track', 'Subscribe', { content_name: 'Telegram Join', source: 'auto_redirect' });
        }
    }

    var startTime = Date.now();
    var interval = setInterval(function() {
        var elapsed = Date.now() - startTime;
        var remaining = Math.max(0, totalMs - elapsed);
        var secLeft = Math.ceil(remaining / 1000);

        if (timerEl) timerEl.textContent = secLeft;
        if (barEl) barEl.style.width = Math.min(100, (elapsed / totalMs) * 100) + '%';

        if (remaining <= 0) {
            clearInterval(interval);
            if (!redirected) {
                redirected = true;
                if (timerEl) { timerEl.textContent = 'Redirecting...'; timerEl.classList.add('done'); }
                if (statusEl) { statusEl.textContent = 'Taking you to Telegram'; statusEl.classList.add('ok'); }
                fireSubscribe();
                window.location.href = TELEGRAM_LINK;
            }
        }
    }, 100);
})();
</script>
